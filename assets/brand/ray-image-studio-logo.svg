      .en { fill: #d7d1c4; font-family: "Optima", "Trajan Pro", "Times New Roman", serif; font-size: 20px; font-weight: 400; letter-spacing: 5px; }
    </style>
  </defs>
  <rect class="bg" width="780" height="220" rx="18"/>
